name: Fix toggle viewmodel routing

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run fix
        run: |
          echo "" | base64 --decode > /tmp/fix.py
          python3 /tmp/fix.py

      - name: Commit
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Already patched"
          else
            git commit -m "fix: route ToggleForceLegacyChannel through NodeDetailViewModel"
            git push origin main --force-with-lease
            echo "Pushed."
          fi
