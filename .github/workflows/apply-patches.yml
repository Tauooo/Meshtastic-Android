name: Apply alphasigma patches

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run patch script
        run: |
          echo "" | base64 --decode > /tmp/patch.py
          python3 /tmp/patch.py

      - name: Commit all patches
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit - all patches already applied"
          else
            git commit -m "feat: persist forceLegacyChannel per node in database"
            git push origin main
            echo "Pushed."
          fi
