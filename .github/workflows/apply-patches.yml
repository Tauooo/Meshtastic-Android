name: Apply alphasigma patches

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Patch Node.kt - add forceLegacyChannel field
        run: |
          FILE="core/model/src/commonMain/kotlin/org/meshtastic/core/model/Node.kt"
          if grep -q "forceLegacyChannel" "$FILE"; then
            echo "Node.kt already patched"
          else
            sed -i 's/    val isMuted: Boolean = false,/    val isMuted: Boolean = false,\n    val forceLegacyChannel: Boolean = false,/' "$FILE"
            echo "Node.kt patched"
          fi

      - name: Patch NodeEntity.kt - add DB column and mappings
        run: |
          FILE="core/database/src/commonMain/kotlin/org/meshtastic/core/database/entity/NodeEntity.kt"
          if grep -q "force_legacy_channel" "$FILE"; then
            echo "NodeEntity.kt already patched"
          else
            # Add column after isMuted field
            sed -i 's/    @ColumnInfo(name = "is_muted", defaultValue = "0") var isMuted: Boolean = false,/    @ColumnInfo(name = "is_muted", defaultValue = "0") var isMuted: Boolean = false,\n    @ColumnInfo(name = "force_legacy_channel", defaultValue = "0") var forceLegacyChannel: Boolean = false,/' "$FILE"
            # Fix all isMuted = isMuted mappings - add forceLegacyChannel after each
            # NodeEntity.toModel()
            python3 - <<'PYEOF'
import re

with open("core/database/src/commonMain/kotlin/org/meshtastic/core/database/entity/NodeEntity.kt", "r") as f:
    content = f.read()

# Add forceLegacyChannel after every isMuted = isMuted, (but not if already patched)
if "forceLegacyChannel = forceLegacyChannel" not in content:
    content = content.replace(
        "        isMuted = isMuted,",
        "        isMuted = isMuted,\n        forceLegacyChannel = forceLegacyChannel,"
    )
    content = content.replace(
        "        isMuted = node.isMuted,",
        "        isMuted = node.isMuted,\n        forceLegacyChannel = node.forceLegacyChannel,"
    )

with open("core/database/src/commonMain/kotlin/org/meshtastic/core/database/entity/NodeEntity.kt", "w") as f:
    f.write(content)
print("NodeEntity.kt mappings patched")
PYEOF
          fi

      - name: Patch MeshtasticDatabase.kt - bump version and add migration
        run: |
          FILE="core/database/src/commonMain/kotlin/org/meshtastic/core/database/MeshtasticDatabase.kt"
          if grep -q "from = 38, to = 39" "$FILE"; then
            echo "MeshtasticDatabase.kt already patched"
          else
            sed -i 's/    version = 38,/    version = 39,/' "$FILE"
            sed -i 's/        AutoMigration(from = 37, to = 38),/        AutoMigration(from = 37, to = 38),\n        AutoMigration(from = 38, to = 39),/' "$FILE"
            echo "MeshtasticDatabase.kt patched"
          fi

      - name: Patch NodeRepositoryImpl.kt - map forceLegacyChannel in toEntity
        run: |
          FILE="core/data/src/commonMain/kotlin/org/meshtastic/core/data/repository/NodeRepositoryImpl.kt"
          if grep -q "forceLegacyChannel = forceLegacyChannel" "$FILE"; then
            echo "NodeRepositoryImpl.kt already patched"
          else
            sed -i 's/        isMuted = isMuted,/        isMuted = isMuted,\n        forceLegacyChannel = forceLegacyChannel,/' "$FILE"
            echo "NodeRepositoryImpl.kt patched"
          fi

      - name: Patch ServiceAction.kt - add ToggleForceLegacyChannel
        run: |
          FILE="core/model/src/commonMain/kotlin/org/meshtastic/core/model/service/ServiceAction.kt"
          if grep -q "ToggleForceLegacyChannel" "$FILE"; then
            echo "ServiceAction.kt already patched"
          else
            sed -i 's/    data class Mute(val node: Node) : ServiceAction()/    data class Mute(val node: Node) : ServiceAction()\n\n    data class ToggleForceLegacyChannel(val node: Node) : ServiceAction()/' "$FILE"
            echo "ServiceAction.kt patched"
          fi

      - name: Patch MeshActionHandlerImpl.kt - handle ToggleForceLegacyChannel
        run: |
          FILE="core/data/src/commonMain/kotlin/org/meshtastic/core/data/manager/MeshActionHandlerImpl.kt"
          if grep -q "ToggleForceLegacyChannel" "$FILE"; then
            echo "MeshActionHandlerImpl.kt already patched"
          else
            python3 - <<'PYEOF'
with open("core/data/src/commonMain/kotlin/org/meshtastic/core/data/manager/MeshActionHandlerImpl.kt", "r") as f:
    content = f.read()

# Add handler dispatch
content = content.replace(
    "                is ServiceAction.Mute -> handleMute(action, myNodeNum)",
    "                is ServiceAction.Mute -> handleMute(action, myNodeNum)\n                is ServiceAction.ToggleForceLegacyChannel -> handleToggleForceLegacyChannel(action)"
)

# Add handler function after handleMute closing brace
old = """    private fun handleMute(action: ServiceAction.Mute, myNodeNum: Int) {
        val node = action.node
        commandSender.sendAdmin(myNodeNum) { AdminMessage(toggle_muted_node = node.num) }
        nodeManager.updateNode(node.num) { it.copy(isMuted = !node.isMuted) }
    }"""

new = """    private fun handleMute(action: ServiceAction.Mute, myNodeNum: Int) {
        val node = action.node
        commandSender.sendAdmin(myNodeNum) { AdminMessage(toggle_muted_node = node.num) }
        nodeManager.updateNode(node.num) { it.copy(isMuted = !node.isMuted) }
    }

    private fun handleToggleForceLegacyChannel(action: ServiceAction.ToggleForceLegacyChannel) {
        val node = action.node
        nodeManager.updateNode(node.num) { it.copy(forceLegacyChannel = !node.forceLegacyChannel) }
    }"""

content = content.replace(old, new)

with open("core/data/src/commonMain/kotlin/org/meshtastic/core/data/manager/MeshActionHandlerImpl.kt", "w") as f:
    f.write(content)
print("MeshActionHandlerImpl.kt patched")
PYEOF
          fi

      - name: Patch NodeMenuAction.kt - add ToggleForceLegacyChannel
        run: |
          FILE="feature/node/src/commonMain/kotlin/org/meshtastic/feature/node/component/NodeMenuAction.kt"
          if grep -q "ToggleForceLegacyChannel" "$FILE"; then
            echo "NodeMenuAction.kt already patched"
          else
            sed -i 's/    data class Mute(val node: Node) : NodeMenuAction()/    data class Mute(val node: Node) : NodeMenuAction()\n\n    data class ToggleForceLegacyChannel(val node: Node) : NodeMenuAction()/' "$FILE"
            echo "NodeMenuAction.kt patched"
          fi

      - name: Patch NodeDetailActions.kt - route ToggleForceLegacyChannel
        run: |
          FILE="feature/node/src/commonMain/kotlin/org/meshtastic/feature/node/detail/NodeDetailActions.kt"
          if grep -q "ToggleForceLegacyChannel" "$FILE"; then
            echo "NodeDetailActions.kt already patched"
          else
            sed -i 's/            is NodeMenuAction.Mute -> nodeManagementActions.muteNode(scope, action.node)/            is NodeMenuAction.Mute -> nodeManagementActions.muteNode(scope, action.node)\n            is NodeMenuAction.ToggleForceLegacyChannel -> nodeManagementActions.toggleForceLegacyChannel(scope, action.node)/' "$FILE"
            echo "NodeDetailActions.kt patched"
          fi

      - name: Patch NodeManagementActions.kt - add toggleForceLegacyChannel
        run: |
          FILE="feature/node/src/commonMain/kotlin/org/meshtastic/feature/node/detail/NodeManagementActions.kt"
          if grep -q "toggleForceLegacyChannel" "$FILE"; then
            echo "NodeManagementActions.kt already patched"
          else
            python3 - <<'PYEOF'
with open("feature/node/src/commonMain/kotlin/org/meshtastic/feature/node/detail/NodeManagementActions.kt", "r") as f:
    content = f.read()

old = """    open fun muteNode(scope: CoroutineScope, node: Node) {
        scope.launch(ioDispatcher) { serviceRepository.onServiceAction(ServiceAction.Mute(node)) }
    }"""

new = """    open fun muteNode(scope: CoroutineScope, node: Node) {
        scope.launch(ioDispatcher) { serviceRepository.onServiceAction(ServiceAction.Mute(node)) }
    }

    open fun toggleForceLegacyChannel(scope: CoroutineScope, node: Node) {
        scope.launch(ioDispatcher) { serviceRepository.onServiceAction(ServiceAction.ToggleForceLegacyChannel(node)) }
    }"""

content = content.replace(old, new)

with open("feature/node/src/commonMain/kotlin/org/meshtastic/feature/node/detail/NodeManagementActions.kt", "w") as f:
    f.write(content)
print("NodeManagementActions.kt patched")
PYEOF
          fi

      - name: Patch DeviceActions.kt - use persistent node state
        run: |
          FILE="feature/node/src/commonMain/kotlin/org/meshtastic/feature/node/component/DeviceActions.kt"
          if grep -q "ToggleForceLegacyChannel" "$FILE"; then
            echo "DeviceActions.kt already patched"
          else
            python3 - <<'PYEOF'
with open("feature/node/src/commonMain/kotlin/org/meshtastic/feature/node/component/DeviceActions.kt", "r") as f:
    content = f.read()

# Remove rememberSaveable state line
content = content.replace(
    "    var forceLegacyChannel by rememberSaveable(node.num) { mutableStateOf(false) }\n\n",
    ""
)

# Remove unused imports
for imp in [
    "import androidx.compose.runtime.getValue\n",
    "import androidx.compose.runtime.mutableStateOf\n",
    "import androidx.compose.runtime.saveable.rememberSaveable\n",
    "import androidx.compose.runtime.setValue\n",
]:
    content = content.replace(imp, "")

# Update PrimaryActionsRow call to use node.forceLegacyChannel
content = content.replace(
    "                forceLegacyChannel = forceLegacyChannel,\n                onAction = onAction,\n            )\n\n            if (!isLocal) {\n                SectionDivider(Modifier.padding(vertical = 8.dp))\n                ManagementActions(\n                    node = node,\n                    forceLegacyChannel = forceLegacyChannel,\n                    onToggleLegacy = { forceLegacyChannel = it },\n                    onAction = onAction,",
    "                forceLegacyChannel = node.forceLegacyChannel,\n                onAction = onAction,\n            )\n\n            if (!isLocal) {\n                SectionDivider(Modifier.padding(vertical = 8.dp))\n                ManagementActions(\n                    node = node,\n                    forceLegacyChannel = node.forceLegacyChannel,\n                    onToggleLegacy = { onAction(NodeDetailAction.HandleNodeMenuAction(NodeMenuAction.ToggleForceLegacyChannel(node))) },\n                    onAction = onAction,",
)

with open("feature/node/src/commonMain/kotlin/org/meshtastic/feature/node/component/DeviceActions.kt", "w") as f:
    f.write(content)
print("DeviceActions.kt patched")
PYEOF
          fi

      - name: Commit all patches
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit - all patches already applied"
          else
            git commit -m "feat: persist forceLegacyChannel per node in database"
            git push origin main
            echo "All patches committed and pushed"
          fi
