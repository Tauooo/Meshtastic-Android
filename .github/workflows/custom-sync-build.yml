name: alphasigma - Sync & Build App

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.sync.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Fetch and merge upstream
        id: sync
        run: |
          git remote add upstream https://github.com/meshtastic/Meshtastic-Android.git || true
          git fetch upstream main
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "### No upstream changes today" >> $GITHUB_STEP_SUMMARY
          else
            git merge upstream/main --no-edit || {
              echo "### Merge conflict - resolve manually" >> $GITHUB_STEP_SUMMARY
              git merge --abort
              exit 1
            }
            git push origin main
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "### Merged upstream" >> $GITHUB_STEP_SUMMARY
          fi

  build:
    needs: sync
    if: needs.sync.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Write secrets.properties
        run: |
          printf 'MAPS_API_KEY=%s\n' "${{ secrets.MAPS_API_KEY }}" > secrets.properties

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Write keystore.properties
        run: |
          printf 'storeFile=%s\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "${{ github.workspace }}/keystore.jks" \
            "${{ secrets.KEYSTORE_STORE_PASSWORD }}" \
            "${{ secrets.KEYSTORE_KEY_ALIAS }}" \
            "${{ secrets.KEYSTORE_KEY_PASSWORD }}" > keystore.properties

      - name: Build Google Release APK
        run: ./gradlew app:assembleGoogleRelease -x uploadCrashlyticsMappingFileGoogleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alphasigma-app-google-release
          path: app/build/outputs/apk/google/release/*.apk
          retention-days: 30
