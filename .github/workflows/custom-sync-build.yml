name: alphasigma — Sync & Build App

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.sync.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Fetch and merge upstream
        id: sync
        run: |
          git remote add upstream https://github.com/meshtastic/Meshtastic-Android.git || true
          git fetch upstream main
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "### ⏭ No upstream changes today" >> $GITHUB_STEP_SUMMARY
          else
            git merge upstream/main --no-edit || {
              echo "### ❌ Merge conflict — resolve manually" >> $GITHUB_STEP_SUMMARY
              git merge --abort
              exit 1
            }
            git push origin main
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "### ✅ Merged upstream" >> $GITHUB_STEP_SUMMARY
          fi

  build:
    needs: sync
    if: needs.sync.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Write Maps API key
        run: echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      - name: Build alphasigma APK
        run: ./gradlew app:assembleFdroidDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alphasigma-app-debug
          path: app/build/outputs/apk/fdroid/debug/*.apk
          retention-days: 30
