name: Add lock icon to encrypted messages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run patch
        run: |
          echo "" | base64 --decode > /tmp/patch.py
          python3 /tmp/patch.py

      - name: Commit
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Already patched"
          else
            git commit -m "feat: show lock icon on PKC encrypted messages"
            git push origin main --force-with-lease
            echo "Pushed."
          fi
